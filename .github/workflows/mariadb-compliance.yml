name: MariaDB Compliance Tests

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/complianceserver/**'
      - '.github/workflows/mariadb-compliance.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/complianceserver/**'
      - '.github/workflows/mariadb-compliance.yml'

permissions:
  contents: read

jobs:
  mariadb-compliance:
    name: MariaDB Compliance Tests
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_USER: odata
          MARIADB_PASSWORD: odata_test
          MARIADB_DATABASE: odata_test
          MARIADB_ROOT_PASSWORD: root_password
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-1.25-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-1.25-

    - name: Build compliance server
      run: cd cmd/complianceserver && go build -o "$RUNNER_TEMP/complianceserver" .

    - name: Start compliance server (MariaDB)
      run: |
        nohup "$RUNNER_TEMP/complianceserver" -db mariadb \
          -dsn "odata:odata_test@tcp(localhost:3306)/odata_test?parseTime=true" \
          -port 9090 > "$RUNNER_TEMP/server.log" 2>&1 &
        echo "Started complianceserver (pid $!)"

    - name: Run compliance suite
      uses: NLstn/odata-compliance-suite@755c9b07924f1803f25dc86c30c1fc680c19d7b9 # PR #53
      with:
        server: http://localhost:9090
        timeout: 60
        suite-version: source

    - name: Compliance server logs (on failure)
      if: failure()
      run: cat "$RUNNER_TEMP/server.log" || true
