name: MSSQL Compliance Tests

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/complianceserver/**'
      - '.github/workflows/mssql-compliance.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/complianceserver/**'
      - '.github/workflows/mssql-compliance.yml'

permissions:
  contents: read

jobs:
  mssql-compliance:
    name: MSSQL Compliance Tests
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "StrongPassw0rd!"
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P StrongPassw0rd! -Q 'SELECT 1' -C"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 1433:1433

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-1.25-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-1.25-

    - name: Create test database
      run: |
        docker exec "${{ job.services.mssql.id }}" /opt/mssql-tools18/bin/sqlcmd \
          -S localhost -U sa -P "StrongPassw0rd!" -Q "IF DB_ID('odata_test') IS NULL CREATE DATABASE odata_test;" -C

    - name: Build compliance server
      run: cd cmd/complianceserver && go build -o "$RUNNER_TEMP/complianceserver" .

    - name: Start compliance server (MSSQL)
      run: |
        nohup "$RUNNER_TEMP/complianceserver" -db mssql \
          -dsn "sqlserver://sa:StrongPassw0rd!@localhost:1433?database=odata_test&encrypt=disable" \
          -port 9090 > "$RUNNER_TEMP/server.log" 2>&1 &
        echo "Started complianceserver (pid $!)"

    - name: Run compliance suite
      uses: NLstn/odata-compliance-suite@732f9a1f2a7452db7390480b5e3115d8925bc200 # v1
      with:
        server: http://localhost:9090
        timeout: 60

    - name: Compliance server logs (on failure)
      if: failure()
      run: cat "$RUNNER_TEMP/server.log" || true
