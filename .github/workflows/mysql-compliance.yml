name: MySQL Compliance Tests

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/complianceserver/**'
      - '.github/workflows/mysql-compliance.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/complianceserver/**'
      - '.github/workflows/mysql-compliance.yml'

permissions:
  contents: read

jobs:
  mysql-compliance:
    name: MySQL Compliance Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_USER: odata
          MYSQL_PASSWORD: odata_test
          MYSQL_DATABASE: odata_test
          MYSQL_ROOT_PASSWORD: root_password
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-1.25-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-1.25-

    - name: Build compliance server
      run: cd cmd/complianceserver && go build -o "$RUNNER_TEMP/complianceserver" .

    - name: Start compliance server (MySQL)
      run: |
        nohup "$RUNNER_TEMP/complianceserver" -db mysql \
          -dsn "odata:odata_test@tcp(localhost:3306)/odata_test?parseTime=true" \
          -port 9090 > "$RUNNER_TEMP/server.log" 2>&1 &
        echo "Started complianceserver (pid $!)"

    - name: Run compliance suite
      uses: NLstn/odata-compliance-suite@v1
      with:
        server: http://localhost:9090
        timeout: 60

    - name: Compliance server logs (on failure)
      if: failure()
      run: cat "$RUNNER_TEMP/server.log" || true
