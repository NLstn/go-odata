name: PostgreSQL Compliance Tests

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/complianceserver/**'
      - '.github/workflows/postgres-compliance.yml'
  # No paths filter here: this is a required status check on every PR to main
  # (see the repo's branch ruleset), so it must run regardless of which files
  # changed - a path filter here can leave a PR permanently unable to merge if
  # it happens not to touch a matched path.
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  postgres-compliance:
    name: PostgreSQL Compliance Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: odata
          POSTGRES_PASSWORD: odata_test
          POSTGRES_DB: odata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-1.25-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-1.25-

    - name: Build compliance server
      run: cd cmd/complianceserver && go build -o "$RUNNER_TEMP/complianceserver" .

    - name: Start compliance server (PostgreSQL)
      run: |
        nohup "$RUNNER_TEMP/complianceserver" -db postgres \
          -dsn "postgresql://odata:odata_test@localhost:5432/odata_test?sslmode=disable" \
          -port 9090 > "$RUNNER_TEMP/server.log" 2>&1 &
        echo "Started complianceserver (pid $!)"

    - name: Run compliance suite
      uses: NLstn/odata-compliance-suite@9b28c9c52d9faac56346bcbbed159db362bdd6cf # PR #53
      with:
        server: http://localhost:9090
        timeout: 60
        suite-version: source

    - name: Compliance server logs (on failure)
      if: failure()
      run: cat "$RUNNER_TEMP/server.log" || true
